<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Oferente - Mi CV')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: nav-oferente}"></nav>

    <div class="container">
        <h1>Mi CV</h1>

        <div class="detail-box">
            <div th:if="${oferente.cvPath != null}">
                <p style="color: #28a745; margin-bottom: 12px;">CV subido correctamente.</p>
                <a th:href="@{/uploads/cvs/{file}(file=${oferente.id} + '_cv.pdf')}"
                   class="btn btn-primary" target="_blank">Ver mi CV (PDF)</a>
            </div>
            <div th:unless="${oferente.cvPath != null}">
                <p style="color: #999; margin-bottom: 12px;">Aun no has subido tu CV.</p>
            </div>
        </div>

        <div class="form-container" style="margin-top: 24px;">
            <h2>Subir CV</h2>
            <form th:action="@{/oferente/subir-cv}" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Archivo PDF</label>
                    <input type="file" name="archivo" accept=".pdf" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-success">Subir</button>
                </div>
            </form>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
