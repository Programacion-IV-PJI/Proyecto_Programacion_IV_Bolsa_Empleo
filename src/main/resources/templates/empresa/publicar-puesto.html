<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Empresa - Publicar puesto')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: nav-empresa}"></nav>

    <div class="container">
        <div class="form-container wide">
            <h2>Publicar nuevo puesto</h2>

            <form th:action="@{/empresa/puestos/guardar}" th:object="${puesto}" method="post">
                <div class="form-group">
                    <label>Descripcion del puesto</label>
                    <input type="text" th:field="*{descripcion}" placeholder="Ej: Full Stack Developer">
                </div>
                <div class="form-group">
                    <label>Salario ofrecido</label>
                    <input type="number" step="0.01" th:field="*{salario}">
                </div>
                <div class="form-group">
                    <label>Tipo de publicacion</label>
                    <select th:field="*{publica}">
                        <option value="true">Publica</option>
                        <option value="false">Privada</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Caracteristicas requeridas</label>
                    <div th:each="c : ${caracteristicas}" style="display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 8px; background: #f9f9f9;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <input type="checkbox" name="caracteristicaIds" th:value="${c.id}" style="width: 18px; height: 18px; cursor: pointer;">
                            <span th:text="${c.nombre}" style="font-size: 14px;">Caracteristica</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <label style="font-size: 13px; color: #666;">Nivel:</label>
                            <input type="number" name="niveles" min="1" max="5" value="1" style="width: 55px; padding: 4px 8px; border: 1px solid #ddd; border-radius: 4px; text-align: center;">
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-success">Publicar</button>
                    <a th:href="@{/empresa/puestos}" class="btn btn-outline">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
