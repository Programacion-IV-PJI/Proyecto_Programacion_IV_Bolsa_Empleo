<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Empresa - Publicar puesto')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: nav-empresa}"></nav>

    <div class="container">
        <div class="form-container wide">
            <h2>Publicar nuevo puesto</h2>

            <form th:action="@{/empresa/puestos/guardar}" th:object="${puesto}" method="post">
                <div class="form-group">
                    <label>Descripcion del puesto</label>
                    <input type="text" th:field="*{descripcion}" placeholder="Ej: Full Stack Developer">
                </div>
                <div class="form-group">
                    <label>Salario ofrecido</label>
                    <input type="number" step="0.01" th:field="*{salario}">
                </div>
                <div class="form-group">
                    <label>Tipo de publicacion</label>
                    <select th:field="*{publica}">
                        <option value="true">Publica</option>
                        <option value="false">Privada</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-success">Publicar</button>
                    <a th:href="@{/empresa/puestos}" class="btn btn-outline">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
